name: Reusable Workflow For Notify Discord

on:
  workflow_call:
    inputs:
      status: 
        required: true
        type: string
      environment:
        required: true
        type: string
      related-link:
        required: true
        type: string
      image-tag:
        required: true
        type: string
  
jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve workflow repository
        id: workflow-repository
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          workflow_repository="${WORKFLOW_REF%%/.github/workflows/*}"

          if [ "$workflow_repository" = "$WORKFLOW_REF" ] || [ -z "$workflow_repository" ]; then
            echo "github.workflow_ref must include an alpha-actions workflow path." >&2
            exit 1
          fi

          echo "repository=$workflow_repository" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.workflow-repository.outputs.repository }}
          ref: ${{ github.workflow_sha }}
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: |
          uv run python scripts/notify-discord.py \
          --webhook_url=${{ secrets.DISCORD_DEPLOY_WEBHOOK_URI }} \
          --status=${{ inputs.status }} \
          --env=${{ inputs.environment }} \
          --repo=${{ github.repository }} \
          --related_link="${{ inputs.related-link }}" \
          --tag=${{ inputs.image-tag }}
